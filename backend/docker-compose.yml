version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: repo-visualizer-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app

  postgres:
    image: postgres:16
    container_name: repo-visualizer-postgres
    environment:
      POSTGRES_DB: repo_visualizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: repo-visualizer-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
